<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Niharo Salesman Web App</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/assets/styles.css?v=16">
</head>
<body class="phone-body">
  <div class="mobile-shell">
    <div class="mobile-hero">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
        <div><h1>Niharo Salesman</h1><p id="salesmanGreeting">Professional phone web app</p></div>
        <span class="status-pill" id="phoneLive" style="background:rgba(255,255,255,.18);color:white"><span class="status-dot"></span> Live</span>
      </div>
    </div>

    <section id="loginView" class="mobile-card">
      <h2>Login</h2>
      <p style="color:var(--muted);margin-top:-4px">Dashboard me created salesman username/password se sign in karein.</p>
      <label>Username / ID</label>
      <input id="smLoginUser" placeholder="small letters" autocomplete="username">
      <div style="height:10px"></div>
      <label>Password</label>
      <input id="smLoginPass" type="password" placeholder="password" autocomplete="current-password">
      <button class="btn btn-primary" id="smLoginBtn" style="width:100%;margin-top:14px">Sign in live</button>
    </section>

    <main id="appView" style="display:none">
      <section class="phone-screen" id="phone-order">
        <div class="mobile-card">
          <h2>New order</h2>
          <label>Party</label><input id="smPartySearch" list="smPartyList" placeholder="Type party name to search" autocomplete="off"><datalist id="smPartyList"></datalist>
          <div style="height:10px"></div>
          <label>Product</label><select id="smProduct"></select>
          <div class="grid-3" style="margin-top:10px">
            <div><label>Qty</label><input id="smQty" type="number" min="1" placeholder="0"></div>
            <div><label>Rate</label><input id="smRate" type="number" min="0" step="0.01" placeholder="0"></div>
            <button class="btn btn-warning" id="smAddItem" style="align-self:end">Add</button>
          </div>
          <div id="smCart" style="margin-top:12px"></div>
          <button class="btn btn-primary" id="smSubmitOrder" style="width:100%;margin-top:12px">Submit order</button>
        </div>
      </section>

      <section class="phone-screen" id="phone-history" style="display:none">
        <div class="mobile-card">
          <h2>My orders</h2>
          <div id="smOrders"></div>
        </div>
      </section>

      <section class="phone-screen" id="phone-targets" style="display:none">
        <div class="mobile-card">
          <h2>My targets</h2>
          <div id="smTargets"></div>
        </div>
      </section>

      <section class="phone-screen" id="phone-stock" style="display:none">
        <div class="mobile-card">
          <h2>Product stock</h2>
          <input id="smStockSearch" placeholder="Search product" style="margin-bottom:10px">
          <div id="smStock"></div>
        </div>
      </section>

      <section class="phone-screen" id="phone-account" style="display:none">
        <div class="mobile-card">
          <h2>Account</h2>
          <p style="color:var(--muted)">Logged in as <b id="smAccountName"></b></p>
          <button class="btn btn-soft" id="installHintBtn" style="width:100%">Add to Home Screen: Chrome menu → Install app</button>
          <button class="btn btn-danger" id="smLogoutBtn" style="width:100%;margin-top:10px">Logout</button>
        </div>
      </section>
    </main>
  </div>

  <nav class="mobile-nav" id="phoneNav" style="display:none">
    <button class="active" data-phone="order">🧾<br>Order</button>
    <button data-phone="history">📋<br>History</button>
    <button data-phone="targets">🎯<br>Target</button>
    <button data-phone="stock">📦<br>Stock</button>
    <button data-phone="account">👤<br>Account</button>
  </nav>
  <div class="toast-stack" id="toastStack"></div>
  <script src="/assets/salesman.js?v=16"></script>
</body>
</html>
